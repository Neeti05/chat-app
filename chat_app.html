<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:          #0b0c10;
      --panel:       #111318;
      --surface:     #181c25;
      --border:      #232836;
      --accent:      #7c6aff;
      --accent2:     #ff6a9e;
      --accent3:     #6affda;
      --text:        #e8eaf0;
      --muted:       #6b7080;
      --bubble-me:   #1e1a3a;
      --bubble-them: #161b26;
      --online:      #3dffa0;
      --glow:        rgba(124,106,255,.25);
      --danger:      #ff5757;
      --dm-accent:   #ffb347;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 55% at 15% 10%, rgba(124,106,255,.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 85% 90%, rgba(255,106,158,.12) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 70% 20%, rgba(106,255,218,.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ── */
    #app { position: relative; z-index: 1; display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

    /* ══ SIDEBAR ══ */
    #sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(124,106,255,.08), transparent); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .logo-mark { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 16px; box-shadow: 0 4px 16px var(--glow); }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -.3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-wrap { position: relative; }
    .search-wrap input { width: 100%; padding: 10px 14px 10px 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 13.5px; font-family: inherit; outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
    .section-label { padding: 16px 24px 8px; font-size: 10.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .section-label .label-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 6px; transition: color .15s, background .15s; }
    .section-label .label-btn:hover { color: var(--text); background: var(--surface); }
    .room-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
    .room-list::-webkit-scrollbar { width: 4px; }
    .room-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .room-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background .15s, transform .1s; position: relative; }
    .room-item:hover { background: var(--surface); transform: translateX(2px); }
    .room-item.active { background: linear-gradient(135deg, rgba(124,106,255,.18), rgba(255,106,158,.08)); border: 1px solid rgba(124,106,255,.3); }
    .room-item.dm-item.active { background: linear-gradient(135deg, rgba(255,179,71,.12), rgba(255,106,158,.06)); border: 1px solid rgba(255,179,71,.3); }
    .room-avatar { width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; position: relative; }
    .status-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; border-radius: 50%; background: var(--online); border: 2px solid var(--panel); }
    .status-dot.offline { background: var(--muted); }
    .room-info { flex: 1; min-width: 0; }
    .room-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-meta { text-align: right; flex-shrink: 0; }
    .room-time { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .unread-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 99px; text-align: center; min-width: 18px; display: inline-block; }
    .dm-unread { background: var(--dm-accent); }
    .user-strip { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,.15); }
    .my-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 14px; font-weight: 700; flex-shrink: 0; cursor: pointer; }
    .my-name { font-size: 13.5px; font-weight: 500; }
    .my-status { font-size: 11.5px; color: var(--online); }
    .settings-btn { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 8px; transition: color .15s, background .15s; }
    .settings-btn:hover { color: var(--text); background: var(--surface); }

    /* ══ MAIN ══ */
    #main { display: flex; flex-direction: column; overflow: hidden; }
    .chat-topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: rgba(17,19,24,.8); backdrop-filter: blur(12px); }
    .topbar-avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #3a3060, #5a2060); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
    .topbar-info { flex: 1; }
    .topbar-name { font-size: 15px; font-weight: 600; margin-bottom: 1px; font-family: 'DM Serif Display', serif; letter-spacing: -.2px; }
    .topbar-sub { font-size: 12px; color: var(--muted); }
    .topbar-online { color: var(--online); }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; cursor: pointer; color: var(--muted); font-size: 14px; transition: all .15s; }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(124,106,255,.12); }

    /* ══ MESSAGES ══ */
    #messages { flex: 1; overflow-y: auto; padding: 28px 28px 16px; display: flex; flex-direction: column; gap: 6px; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .date-divider { display: flex; align-items: center; gap: 12px; margin: 12px 0; color: var(--muted); font-size: 11.5px; font-weight: 500; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .msg-row { display: flex; gap: 10px; align-items: flex-end; animation: msgIn .25s cubic-bezier(.34,1.56,.64,1) both; position: relative; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(12px) scale(.96); } to { opacity: 1; transform: none; } }
    .msg-row.me { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: grid; place-items: center; font-size: 12px; font-weight: 700; margin-bottom: 2px; align-self: flex-end; }
    .msg-group { display: flex; flex-direction: column; gap: 3px; max-width: 62%; }
    .msg-row.me .msg-group { align-items: flex-end; }
    .msg-sender { font-size: 11px; font-weight: 600; color: var(--muted); padding: 0 12px; margin-bottom: 2px; }
    .reply-preview { background: rgba(255,255,255,.05); border-left: 3px solid var(--accent); border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; font-size: 12px; cursor: pointer; transition: background .15s; }
    .reply-preview:hover { background: rgba(255,255,255,.09); }
    .reply-preview .rp-name { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .reply-preview .rp-text { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-row.me .reply-preview { border-left-color: var(--accent2); }
    .msg-row.me .reply-preview .rp-name { color: var(--accent2); }
    .msg-image { max-width: 260px; max-height: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: zoom-in; object-fit: cover; transition: opacity .15s; }
    .msg-image:hover { opacity: .9; }
    .bubble { padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.55; position: relative; word-break: break-word; }
    .bubble.them { background: var(--bubble-them); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
    .bubble.me { background: linear-gradient(135deg, #2d2060, #3d1055); border: 1px solid rgba(124,106,255,.3); border-bottom-right-radius: 5px; color: #ddd4ff; }
    .bubble.me.first { border-top-right-radius: 18px; }
    .bubble.them.first { border-top-left-radius: 18px; }
    .bubble.deleted { opacity: .45; font-style: italic; color: var(--muted) !important; }
    .edited-label { font-size: 10px; color: var(--muted); margin-left: 6px; }
    .mention { color: var(--accent); font-weight: 600; background: rgba(124,106,255,.12); border-radius: 4px; padding: 0 3px; cursor: pointer; }
    .mention:hover { background: rgba(124,106,255,.22); }
    .msg-actions { position: absolute; top: -16px; right: 8px; display: none; gap: 2px; background: var(--panel); border: 1px solid var(--border); padding: 4px 6px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.4); z-index: 10; }
    .msg-row.me .msg-actions { right: auto; left: 8px; }
    .msg-row:hover .msg-actions { display: flex; }
    .act-btn { width: 26px; height: 26px; border-radius: 7px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 13px; display: grid; place-items: center; transition: all .12s; }
    .act-btn:hover { background: var(--surface); color: var(--text); }
    .act-btn.danger:hover { background: rgba(255,87,87,.15); color: var(--danger); }
    .reaction-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .react-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 99px; padding: 2px 8px; cursor: pointer; transition: background .12s; }
    .react-badge:hover { background: rgba(255,255,255,.12); }
    .react-badge.mine { border-color: var(--accent); background: rgba(124,106,255,.12); }
    .quick-react-popup { position: absolute; top: -44px; left: 50%; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 6px 10px; display: none; gap: 6px; z-index: 20; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .msg-row:hover .quick-react-popup { display: flex; }
    .qr-em { font-size: 17px; cursor: pointer; transition: transform .1s; padding: 2px; }
    .qr-em:hover { transform: scale(1.35); }
    .msg-time { font-size: 10.5px; color: var(--muted); padding: 0 4px; margin-top: 1px; }
    .msg-row.me .msg-time { text-align: right; }
    .typing-row { display: flex; gap: 10px; align-items: center; padding: 4px 0; animation: msgIn .2s ease both; }
    .typing-avatar { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; background: linear-gradient(135deg, #1e3a2f, #1a2e3a); display: grid; place-items: center; font-size: 12px; }
    .typing-bubble { background: var(--bubble-them); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 5px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .dot:nth-child(1) { animation: bounce .9s ease infinite; }
    .dot:nth-child(2) { animation: bounce .9s ease infinite .18s; }
    .dot:nth-child(3) { animation: bounce .9s ease infinite .36s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }
    .system-msg { text-align: center; font-size: 11.5px; color: var(--muted); padding: 8px 0; display: flex; align-items: center; gap: 8px; justify-content: center; }
    .system-msg::before, .system-msg::after { content: ''; flex: 0 0 40px; height: 1px; background: var(--border); }
    #replyBar { display: none; align-items: center; gap: 10px; padding: 8px 20px; background: rgba(124,106,255,.08); border-top: 1px solid rgba(124,106,255,.2); font-size: 13px; }
    #replyBar.visible { display: flex; }
    #replyBar .rb-label { color: var(--accent); font-weight: 600; }
    #replyBar .rb-text { color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #replyBar .rb-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 6px; }
    #replyBar .rb-close:hover { color: var(--text); }
    #mentionDropdown { position: absolute; bottom: 100%; left: 20px; right: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 6px; display: none; flex-direction: column; gap: 2px; box-shadow: 0 -8px 30px rgba(0,0,0,.5); z-index: 50; max-height: 200px; overflow-y: auto; }
    #mentionDropdown.visible { display: flex; }
    .mention-opt { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: background .12s; }
    .mention-opt:hover, .mention-opt.focused { background: var(--surface); }
    .mention-opt .mo-av { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; font-size: 14px; flex-shrink: 0; }
    .mention-opt .mo-name { font-size: 13px; font-weight: 500; }
    .input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); background: rgba(17,19,24,.9); backdrop-filter: blur(12px); position: relative; }
    .quick-emojis { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
    .quick-emojis::-webkit-scrollbar { display: none; }
    .eq { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; font-size: 15px; cursor: pointer; transition: transform .12px, background .12s; flex-shrink: 0; }
    .eq:hover { transform: scale(1.2); background: rgba(124,106,255,.15); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap { flex: 1; position: relative; }
    #msgInput { width: 100%; padding: 13px 88px 13px 18px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; resize: none; line-height: 1.5; max-height: 120px; min-height: 48px; transition: border-color .2s, box-shadow .2s; }
    #msgInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.12); }
    #msgInput::placeholder { color: var(--muted); }
    .input-icons { position: absolute; right: 12px; bottom: 12px; display: flex; gap: 6px; }
    .input-icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; width: 28px; height: 28px; display: grid; place-items: center; border-radius: 8px; transition: color .15s, background .15s; }
    .input-icon-btn:hover { color: var(--accent); background: rgba(124,106,255,.12); }
    .send-btn { width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: grid; place-items: center; font-size: 17px; transition: transform .12s, opacity .12s; box-shadow: 0 4px 16px rgba(124,106,255,.4); }
    .send-btn:hover { transform: scale(1.06); }
    .send-btn:active { transform: scale(.95); opacity: .85; }
    #fileInput { display: none; }
    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 300; display: none; place-items: center; cursor: zoom-out; backdrop-filter: blur(8px); }
    #lightbox.open { display: grid; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,.7); }
    #editModal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: none; place-items: center; }
    #editModal.open { display: grid; }
    .edit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 480px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    .edit-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .edit-textarea { width: 100%; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; resize: none; min-height: 80px; transition: border-color .2s; }
    .edit-textarea:focus { border-color: var(--accent); }
    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .btn { padding: 9px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 13.5px; font-family: inherit; font-weight: 500; transition: all .12s; }
    .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 14px rgba(124,106,255,.4); }
    .btn-primary:hover { transform: translateY(-1px); }
    #dmModal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: none; place-items: center; }
    #dmModal.open { display: grid; }
    .dm-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    .dm-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .dm-card p { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .dm-user-list { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
    .dm-user-opt { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background .12s; }
    .dm-user-opt:hover { background: var(--surface); }
    .dm-user-opt .du-av { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
    .dm-user-opt .du-name { font-size: 14px; font-weight: 500; }
    .dm-user-opt .du-status { font-size: 12px; color: var(--online); }
    #dmSearch { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 13.5px; font-family: inherit; outline: none; margin-bottom: 12px; transition: border-color .2s; }
    #dmSearch:focus { border-color: var(--dm-accent); }
    #dmSearch::placeholder { color: var(--muted); }
    #connBanner { display: flex; align-items: center; gap: 8px; padding: 6px 28px; font-size: 12px; font-weight: 500; background: rgba(11,12,16,.7); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
    #toasts { position: fixed; top: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 10px 16px; font-size: 13px; min-width: 200px; animation: toastIn .3s cubic-bezier(.34,1.56,.64,1) both; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .toast.dm-toast { border-left-color: var(--dm-accent); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } }
    #imgPreviewBar { display: none; padding: 8px 20px; gap: 8px; align-items: center; border-top: 1px solid var(--border); background: rgba(17,19,24,.6); }
    #imgPreviewBar.visible { display: flex; }
    #imgPreviewThumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
    #imgPreviewName { font-size: 12px; color: var(--muted); flex: 1; }
    #imgPreviewClose { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
    #imgPreviewClose:hover { color: var(--danger); }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* Auth loading screen */
    #authLoader { position:fixed; inset:0; z-index:999; background:var(--bg); display:grid; place-items:center; transition:opacity .3s; }
    #authLoader.hidden { opacity:0; pointer-events:none; }
    .loader-logo { display:flex; flex-direction:column; align-items:center; gap:16px; }
    .loader-mark { width:60px; height:60px; border-radius:18px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:grid; place-items:center; font-size:28px; box-shadow:0 8px 28px var(--glow); animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .loader-text { font-family:'DM Serif Display',serif; font-size:22px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  </style>
</head>
<body>

<!-- Auth check loader -->
<div id="authLoader">
  <div class="loader-logo">
    <div class="loader-mark">✦</div>
    <div class="loader-text">ChatRoom</div>
  </div>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<!-- Image lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- Edit modal -->
<div id="editModal">
  <div class="edit-card">
    <h3>✏️ Edit Message</h3>
    <textarea class="edit-textarea" id="editTextarea" rows="3"></textarea>
    <div class="edit-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- DM modal -->
<div id="dmModal">
  <div class="dm-card">
    <h3>💌 New Direct Message</h3>
    <p>Choose someone online to start a private conversation</p>
    <input id="dmSearch" placeholder="Search users…" oninput="filterDmUsers()" autocomplete="off"/>
    <div class="dm-user-list" id="dmUserList"></div>
    <div style="margin-top:14px;text-align:right">
      <button class="btn btn-ghost" onclick="closeDmModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">✦</div>
        <span class="logo-text">ChatRoom</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search rooms…" id="roomSearch" oninput="filterRooms()"/>
      </div>
    </div>

    <div class="section-label">Channels</div>
    <div class="room-list" id="roomList"></div>

    <div class="section-label" style="margin-top:4px">
      Direct Messages
      <button class="label-btn" title="New DM" onclick="openDmModal()">＋</button>
    </div>
    <div class="room-list" id="dmList" style="flex:0 0 auto;max-height:160px"></div>

    <div class="user-strip" id="userStrip" style="display:none">
      <div class="my-avatar" id="myAvatarEl">?</div>
      <div>
        <div class="my-name" id="myNameEl">—</div>
        <div class="my-status">● Online</div>
      </div>
      <!-- Logout button replaces settings -->
      <button class="settings-btn" title="Logout" onclick="doLogout()">🚪</button>
    </div>
  </div>

  <!-- Main Chat -->
  <div id="main">
    <div id="connBanner">
      <span id="connDot" style="width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;box-shadow:0 0 6px currentColor;transition:background .3s"></span>
      <span id="connLabel" style="color:var(--muted);transition:color .3s">Connecting…</span>
      <span style="margin-left:auto;color:var(--muted);font-size:11px" id="latencyLabel"></span>
    </div>

    <div class="chat-topbar">
      <div class="topbar-avatar" id="topbarAvatar">💬</div>
      <div class="topbar-info">
        <div class="topbar-name" id="topbarName">General</div>
        <div class="topbar-sub" id="topbarSub"><span class="topbar-online">●</span> Loading…</div>
      </div>
      <div class="topbar-actions">
        <div class="icon-btn" title="Search messages" onclick="toast('Message search coming soon 🔍')">🔍</div>
        <div class="icon-btn" title="Members" onclick="showMembers()">👥</div>
        <div class="icon-btn" title="Pinned" onclick="toast('Pinned messages 📌')">📌</div>
      </div>
    </div>

    <div id="messages"></div>

    <div id="imgPreviewBar">
      <img id="imgPreviewThumb" src="" alt=""/>
      <span id="imgPreviewName">image.png</span>
      <button id="imgPreviewClose" onclick="clearImageAttachment()">✕</button>
    </div>

    <div id="replyBar">
      <span>↩️</span>
      <span class="rb-label" id="replyBarName"></span>
      <span class="rb-text" id="replyBarText"></span>
      <button class="rb-close" onclick="clearReply()">✕</button>
    </div>

    <div class="input-area">
      <div id="mentionDropdown"></div>
      <div class="quick-emojis" id="quickEmojis"></div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msgInput" placeholder="Write a message… (use @ to mention)" rows="1"
            oninput="autoResize(this); handleTyping(); handleMentionInput(event)"
            onkeydown="handleKey(event)"></textarea>
          <div class="input-icons">
            <button class="input-icon-btn" title="Attach image" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <button class="input-icon-btn" title="Emoji" onclick="toast('Full emoji picker coming soon 😊')">😊</button>
          </div>
        </div>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)"/>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
/* ═══════════════════════════════════════════
   AUTH GUARD — runs before anything else
═══════════════════════════════════════════ */
let myName = '', myAvatar = '', myBg = '';

async function authGuard() {
  try {
    const r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.href = '/login'; return false; }
    const d = await r.json();
    if (!d.ok) { window.location.href = '/login'; return false; }
    // Populate globals from session
    myName   = d.user.username;
    myAvatar = d.user.avatar;
    myBg     = d.user.avatarBg;
    return true;
  } catch(e) {
    window.location.href = '/login';
    return false;
  }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

/* ═══════════════════════════════════════════
   CONFIG & STATE
═══════════════════════════════════════════ */
const AVATARS    = ['🐙','🦊','🐬','🦋','🐉','🦁','🐧','🦅','🦄','🐺','🦚','🐳'];
const AVATAR_BGS = ['#1e1a3a','#2a1a1e','#1a2a1e','#1a1e2a','#2a2a1a','#1e2a2a','#1a1a2a','#2a1a2a','#1e2a1e','#1e1e1e','#2a1e1a','#1a2a2a'];
const ROOMS = [
  { id:'general', emoji:'💬', name:'General',    desc:'Open conversation' },
  { id:'design',  emoji:'🎨', name:'Design',     desc:'UI/UX & aesthetics' },
  { id:'tech',    emoji:'⚡', name:'Technology', desc:'Code & tools' },
  { id:'music',   emoji:'🎵', name:'Music',      desc:'Tunes & vibes' },
  { id:'random',  emoji:'🎲', name:'Random',     desc:'Anything goes' },
];
const QUICK_EMOJIS = ['😊','🔥','❤️','😂','👍','🎉','🤔','✨','😍','👀','💯','🚀'];
const REACT_EMOJIS = ['❤️','😂','🔥','👍','😮','😢'];

let currentRoom  = 'general';
let allMessages  = {};
let unread       = {};
let roomMembers  = {};
let allUsers     = {};
let typingUsers  = {};
let typingTimer  = null;
let socket       = null;
let replyTo      = null;
let pendingImage = null;
let editingMsgId = null;
let dmRooms      = {};
let currentDmKey = null;

ROOMS.forEach(r => { allMessages[r.id] = []; unread[r.id] = 0; roomMembers[r.id] = []; });

/* ═══════════════════════════════════════════
   SOCKET
═══════════════════════════════════════════ */
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    setConnectionStatus('connected');
    socket.emit('join', { name: myName, avatar: myAvatar, avatarBg: myBg, room: currentRoom });
  });
  socket.on('disconnect', () => setConnectionStatus('disconnected'));
  socket.on('connect_error', () => setConnectionStatus('error'));

  socket.on('history', ({ room, messages }) => {
    allMessages[room] = messages.map(normaliseMsg);
    if (room === currentRoom && !currentDmKey) { renderMessages(); scrollToBottom(); }
    buildRoomList();
  });

  socket.on('dm_history', ({ dm_key, messages }) => {
    if (!dmRooms[dm_key]) return;
    dmRooms[dm_key].messages = messages.map(m => { const n = normaliseMsg(m); n.isMine = (m.name === myName); return n; });
    if (currentDmKey === dm_key) { renderMessages(); scrollToBottom(); }
    buildDmList();
  });

  socket.on('message', (m) => {
    const msg = normaliseMsg(m);
    msg.isMine = (m.name === myName);
    if (m.dm_key) { handleIncomingDm(m, msg); return; }
    allMessages[msg.room] = allMessages[msg.room] || [];
    allMessages[msg.room].push(msg);
    if (msg.room === currentRoom && !currentDmKey) {
      appendMessageEl(msg, allMessages[msg.room].length - 1, allMessages[msg.room]);
      scrollToBottom();
      clearTypingUser(m.name);
    } else {
      unread[msg.room] = (unread[msg.room] || 0) + 1;
    }
    buildRoomList();
  });

  socket.on('message_edited', ({ message_id, new_text, room, dm_key }) => {
    updateMsgText(message_id, new_text, room);
  });

  socket.on('message_deleted', ({ message_id, room, dm_key }) => {
    deleteMsgEl(message_id, room);
  });

  socket.on('reaction', ({ message_id, emoji, name, room }) => {
    const el = document.getElementById('msg-' + message_id);
    if (!el) return;
    applyReactionBadge(el, emoji, name);
  });

  socket.on('system', ({ text }) => {
    appendSystemMsg(text);
    scrollToBottom();
  });

  socket.on('user_list', ({ room, users }) => {
    roomMembers[room] = users;
    users.forEach(u => { if (u.name !== myName) allUsers[u.name] = u; });
    if (room === currentRoom && !currentDmKey) updateTopbarSub(users.length);
    buildDmList();
  });

  socket.on('typing', ({ name, avatar }) => {
    if (name === myName) return;
    showTypingUser(name, avatar);
  });

  socket.on('pong_latency', ({ client_ts }) => {
    const rtt = Date.now() - client_ts;
    const el = document.getElementById('latencyLabel');
    if (el) el.textContent = `${rtt}ms`;
  });

  socket.on('dm', (m) => {
    const msg = normaliseMsg(m);
    msg.isMine = (m.name === myName);
    handleIncomingDm(m, msg);
  });
}

function handleIncomingDm(raw, msg) {
  const dmKey = raw.dm_key;
  if (!dmRooms[dmKey]) {
    const peerName = raw.name === myName ? raw.to : raw.name;
    dmRooms[dmKey] = { peer: peerName, messages: [], unread: 0 };
  }
  // Avoid duplicates from optimistic adds
  const exists = dmRooms[dmKey].messages.some(m => m.id === msg.id || (m.id && m.id.startsWith('local_') && m.text === msg.text && m.isMine));
  if (!exists) {
    dmRooms[dmKey].messages.push(msg);
  }
  if (currentDmKey === dmKey) {
    if (!exists) {
      appendMessageEl(msg, dmRooms[dmKey].messages.length - 1, dmRooms[dmKey].messages);
      scrollToBottom();
    }
  } else {
    if (!msg.isMine) {
      dmRooms[dmKey].unread = (dmRooms[dmKey].unread || 0) + 1;
      toast(`💌 DM from ${msg.name}: ${msg.text.slice(0,40)}`, 'dm-toast');
    }
  }
  buildDmList();
}

function normaliseMsg(m) {
  return {
    id:        m.id || Math.random().toString(36).slice(2),
    isMine:    false,
    name:      m.name || 'Unknown',
    avatar:    m.avatar || '🙂',
    avatarBg:  m.avatarBg || '#1e1a3a',
    text:      m.text || '',
    imageUrl:  m.imageUrl || null,
    ts:        m.ts ? (isNaN(m.ts) ? Date.now() : Number(m.ts)) : Date.now(),
    room:      m.room || currentRoom,
    replyTo:   m.replyTo || null,
    deleted:   m.deleted || false,
    edited:    m.edited || false,
    reactions: m.reactions || {},
    dm_key:    m.dm_key || null,
  };
}

function setConnectionStatus(state) {
  const dot = document.getElementById('connDot'), label = document.getElementById('connLabel');
  const map = { connected: { color: 'var(--online)', text: 'Connected' }, disconnected: { color: '#ff6a6a', text: 'Disconnected — retrying…' }, error: { color: '#ffb84d', text: 'Connection error' } };
  const s = map[state] || map.error;
  dot.style.background = s.color; label.textContent = s.text; label.style.color = s.color;
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init() {
  const authed = await authGuard();
  if (!authed) return;

  // Hide loader
  const loader = document.getElementById('authLoader');
  loader.classList.add('hidden');
  setTimeout(() => loader.remove(), 400);

  // Populate UI
  document.getElementById('userStrip').style.display   = 'flex';
  document.getElementById('myAvatarEl').textContent    = myAvatar;
  document.getElementById('myAvatarEl').style.background = myBg;
  document.getElementById('myNameEl').textContent      = myName;

  const qe = document.getElementById('quickEmojis');
  QUICK_EMOJIS.forEach(em => {
    const d = document.createElement('div'); d.className = 'eq'; d.textContent = em;
    d.onclick = () => appendToInput(em); qe.appendChild(d);
  });

  buildRoomList(); buildDmList();
  connectSocket();
  startPing();
  toast(`Welcome back, ${myName}! 🎉`);
}

/* ═══════════════════════════════════════════
   ROOMS
═══════════════════════════════════════════ */
function buildRoomList() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  ROOMS.forEach(r => {
    const msgs = allMessages[r.id], last = msgs[msgs.length - 1];
    const d = document.createElement('div');
    const isActive = r.id === currentRoom && !currentDmKey;
    d.className = 'room-item' + (isActive ? ' active' : '');
    d.innerHTML = `
      <div class="room-avatar" style="background:linear-gradient(135deg,#1e1840,#1a1030)">${r.emoji}</div>
      <div class="room-info">
        <div class="room-name">${r.name}</div>
        <div class="room-preview">${last ? escHtml(last.text || (last.imageUrl ? '🖼️ Image' : '')).slice(0,35) : r.desc}</div>
      </div>
      <div class="room-meta">
        <div class="room-time">${last ? fmtTime(last.ts) : ''}</div>
        ${unread[r.id] ? `<span class="unread-badge">${unread[r.id]}</span>` : ''}
      </div>`;
    d.onclick = () => switchRoom(r.id);
    list.appendChild(d);
  });
}

function buildDmList() {
  const list = document.getElementById('dmList');
  list.innerHTML = '';
  Object.entries(dmRooms).forEach(([key, dm]) => {
    const user = allUsers[dm.peer] || {};
    const d = document.createElement('div');
    const isActive = currentDmKey === key;
    d.className = 'room-item dm-item' + (isActive ? ' active' : '');
    const lastMsg = dm.messages[dm.messages.length - 1];
    d.innerHTML = `
      <div class="room-avatar" style="background:${user.avatarBg || '#2a1a2a'}">${user.avatar || '👤'}
        <span class="status-dot"></span>
      </div>
      <div class="room-info">
        <div class="room-name">${escHtml(dm.peer)}</div>
        <div class="room-preview">${lastMsg ? escHtml(lastMsg.text || '🖼️ Image').slice(0,30) : 'Direct message'}</div>
      </div>
      <div class="room-meta">
        ${lastMsg ? `<div class="room-time">${fmtTime(lastMsg.ts)}</div>` : ''}
        ${dm.unread ? `<span class="unread-badge dm-unread">${dm.unread}</span>` : ''}
      </div>`;
    d.onclick = () => openDm(key);
    list.appendChild(d);
  });
}

function filterRooms() {
  const q = document.getElementById('roomSearch').value.toLowerCase();
  document.querySelectorAll('.room-item').forEach(el => {
    el.style.display = el.querySelector('.room-name').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function switchRoom(id, emit = true) {
  currentRoom = id; currentDmKey = null;
  unread[id]  = 0;
  const room = ROOMS.find(r => r.id === id);
  document.getElementById('topbarAvatar').textContent      = room.emoji;
  document.getElementById('topbarAvatar').style.background = 'linear-gradient(135deg,#3a3060,#5a2060)';
  document.getElementById('topbarName').textContent        = room.name;
  updateTopbarSub(roomMembers[id]?.length || 0);
  clearAllTyping(); clearReply(); clearImageAttachment();
  renderMessages(); buildRoomList(); buildDmList(); scrollToBottom();
  if (emit && socket && myName) socket.emit('switch_room', { room: id });
}

function openDm(dmKey) {
  currentDmKey = dmKey; currentRoom = null;
  const dm   = dmRooms[dmKey];
  dm.unread  = 0;
  const user = allUsers[dm.peer] || {};
  document.getElementById('topbarAvatar').textContent      = user.avatar || '👤';
  document.getElementById('topbarAvatar').style.background = user.avatarBg || '#2a1a2a';
  document.getElementById('topbarName').textContent        = dm.peer;
  document.getElementById('topbarSub').innerHTML           = `<span style="color:var(--dm-accent)">💌</span> Direct message`;
  clearAllTyping(); clearReply(); clearImageAttachment();
  renderMessages(); buildRoomList(); buildDmList(); scrollToBottom();
  // Request persistent history from server
  if (socket) socket.emit('dm_history', { dm_key: dmKey });
}

function updateTopbarSub(count) {
  document.getElementById('topbarSub').innerHTML = `<span class="topbar-online">●</span> ${count} member${count!==1?'s':''} online`;
}

/* ═══════════════════════════════════════════
   DM MODAL
═══════════════════════════════════════════ */
function openDmModal() { document.getElementById('dmModal').classList.add('open'); renderDmUserList(''); }
function closeDmModal() { document.getElementById('dmModal').classList.remove('open'); }
function filterDmUsers() { renderDmUserList(document.getElementById('dmSearch').value.toLowerCase()); }
function renderDmUserList(q) {
  const list = document.getElementById('dmUserList');
  list.innerHTML = '';
  const users = Object.values(allUsers).filter(u => u.name !== myName && u.name.toLowerCase().includes(q));
  if (!users.length) { list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No users online yet</div>'; return; }
  users.forEach(u => {
    const d = document.createElement('div'); d.className = 'dm-user-opt';
    d.innerHTML = `<div class="du-av" style="background:${u.avatarBg}">${u.avatar}</div><div><div class="du-name">${escHtml(u.name)}</div><div class="du-status">● Online</div></div>`;
    d.onclick = () => { closeDmModal(); startDm(u.name); };
    list.appendChild(d);
  });
}
function startDm(peerName) {
  const key = dmKey(myName, peerName);
  if (!dmRooms[key]) dmRooms[key] = { peer: peerName, messages: [], unread: 0 };
  openDm(key);
}
function dmKey(a, b) { return 'dm_' + [a,b].sort().join('__'); }

/* ═══════════════════════════════════════════
   MESSAGES RENDER
═══════════════════════════════════════════ */
function getActiveMessages() {
  if (currentDmKey) return dmRooms[currentDmKey]?.messages || [];
  return allMessages[currentRoom] || [];
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  const div = document.createElement('div'); div.className = 'date-divider'; div.textContent = 'Today';
  container.appendChild(div);
  const sys = document.createElement('div'); sys.className = 'system-msg';
  if (currentDmKey) {
    sys.textContent = `Private conversation with ${dmRooms[currentDmKey]?.peer}`;
  } else {
    const r = ROOMS.find(r => r.id === currentRoom);
    sys.textContent = `You joined #${r?.name?.toLowerCase()}`;
  }
  container.appendChild(sys);
  const msgs = getActiveMessages();
  msgs.forEach((m, i) => appendMessageEl(m, i, msgs, container));
}

function appendMessageEl(m, i, msgs, container) {
  container = container || document.getElementById('messages');
  const ti = document.getElementById('typingIndicator');
  if (ti) ti.remove();

  const isMine  = m.isMine || (m.name === myName);
  const prev    = msgs[i - 1];
  const grouped = prev && (prev.isMine||prev.name===myName) === isMine && prev.name === m.name
                  && (Number(m.ts) - Number(prev.ts) < 120000) && !m.replyTo;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMine ? ' me' : '');
  row.id = 'msg-' + m.id;

  const avatarHtml = grouped
    ? '<div style="width:30px;flex-shrink:0"></div>'
    : `<div class="msg-avatar" style="background:${m.avatarBg}">${m.avatar}</div>`;

  let replyHtml = '';
  if (m.replyTo) {
    replyHtml = `<div class="reply-preview" onclick="scrollToMsg('${m.replyTo.id}')">
      <div class="rp-name">↩ ${escHtml(m.replyTo.name)}</div>
      <div class="rp-text">${escHtml(m.replyTo.text?.slice(0,80) || '🖼️ Image')}</div>
    </div>`;
  }

  const bubbleContent = m.deleted
    ? '<em>This message was deleted</em>'
    : (m.imageUrl
        ? `${m.text ? escHtml(m.text) + '<br>' : ''}<img class="msg-image" src="${m.imageUrl}" alt="image" onclick="openLightbox('${m.imageUrl}')" />`
        : highlightMentions(escHtml(m.text)));

  const reactionsHtml = Object.entries(m.reactions || {}).map(([emoji, users]) =>
    `<span class="react-badge${users.includes(myName) ? ' mine' : ''}" onclick="sendReaction(null,'${emoji}','${m.id}')" title="${users.join(', ')}">${emoji} <span style="font-size:11px;color:var(--muted)">${users.length}</span></span>`
  ).join('');

  const editDelActions = isMine && !m.deleted ? `
    <button class="act-btn" title="Edit" onclick="openEditModal('${m.id}')">✏️</button>
    <button class="act-btn danger" title="Delete" onclick="deleteMessage('${m.id}')">🗑️</button>` : '';
  const replyAction = `<button class="act-btn" title="Reply" onclick="setReply('${m.id}','${escAttr(m.name)}','${escAttr(m.text?.slice(0,80) || '')}')">↩️</button>`;

  row.innerHTML = `
    ${avatarHtml}
    <div class="msg-group">
      ${!grouped ? `<div class="msg-sender">${isMine ? 'You' : escHtml(m.name)}</div>` : ''}
      <div class="bubble ${isMine ? 'me' : 'them'}${!grouped ? ' first' : ''}">
        ${replyHtml}
        <span class="bubble-text">${bubbleContent}</span>
        ${m.edited && !m.deleted ? '<span class="edited-label">(edited)</span>' : ''}
        <div class="quick-react-popup">
          ${REACT_EMOJIS.map(e => `<span class="qr-em" onclick="sendReaction(null,'${e}','${m.id}')">${e}</span>`).join('')}
        </div>
        <div class="msg-actions">
          ${replyAction}
          ${editDelActions}
        </div>
      </div>
      ${reactionsHtml ? `<div class="reaction-row">${reactionsHtml}</div>` : '<div class="reaction-row" id="rr-'+m.id+'"></div>'}
      <div class="msg-time">${fmtTime(m.ts)}</div>
    </div>`;
  container.appendChild(row);
  if (ti) container.appendChild(ti);
}

function appendSystemMsg(text) {
  const container = document.getElementById('messages');
  const el = document.createElement('div'); el.className = 'system-msg'; el.textContent = text;
  const ti = document.getElementById('typingIndicator');
  ti ? container.insertBefore(el, ti) : container.appendChild(el);
}

function highlightMentions(html) {
  return html.replace(/@(\w+)/g, (_, name) =>
    `<span class="mention" onclick="startDmFromMention('${name}')">@${name}</span>`
  );
}
function startDmFromMention(name) {
  if (allUsers[name]) startDm(name); else toast(`@${name} is not currently online`);
}

/* ═══════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════ */
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text && !pendingImage) return;
  if (!myName || !socket) return;

  const payload = { text, replyTo: replyTo || undefined, imageUrl: pendingImage?.dataUrl || undefined };

  if (currentDmKey) {
    const dm = dmRooms[currentDmKey];
    payload.dm_key = currentDmKey;
    payload.to     = dm.peer;
    socket.emit('dm', payload);
    // Optimistic local add
    const localMsg = normaliseMsg({ ...payload, name: myName, avatar: myAvatar, avatarBg: myBg, room: 'dm', id: 'local_' + Date.now(), ts: Date.now() });
    localMsg.isMine = true;
    dmRooms[currentDmKey].messages.push(localMsg);
    appendMessageEl(localMsg, dmRooms[currentDmKey].messages.length-1, dmRooms[currentDmKey].messages);
    scrollToBottom(); buildDmList();
  } else {
    payload.room = currentRoom;
    socket.emit('message', payload);
  }

  input.value = ''; autoResize(input);
  clearReply(); clearImageAttachment(); hideMentionDropdown();
}

/* ═══════════════════════════════════════════
   EDIT & DELETE
═══════════════════════════════════════════ */
function openEditModal(msgId) {
  const msgs = getActiveMessages();
  const msg  = msgs.find(m => m.id === msgId);
  if (!msg || msg.deleted) return;
  editingMsgId = msgId;
  document.getElementById('editTextarea').value = msg.text;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editTextarea').focus(), 50);
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); editingMsgId = null; }
function submitEdit() {
  const newText = document.getElementById('editTextarea').value.trim();
  if (!newText || !editingMsgId) return;
  const payload = { message_id: editingMsgId, new_text: newText };
  if (currentDmKey) payload.dm_key = currentDmKey; else payload.room = currentRoom;
  socket.emit('edit_message', payload);
  updateMsgText(editingMsgId, newText, currentRoom);
  closeEditModal();
}
function updateMsgText(msgId, newText, room) {
  const msgs = room ? (allMessages[room] || []) : getActiveMessages();
  const msg  = msgs.find(m => m.id === msgId);
  if (msg) { msg.text = newText; msg.edited = true; }
  const el = document.getElementById('msg-' + msgId);
  if (el) {
    const bt = el.querySelector('.bubble-text');
    if (bt) bt.innerHTML = highlightMentions(escHtml(newText));
    let ed = el.querySelector('.edited-label');
    if (!ed) { ed = document.createElement('span'); ed.className = 'edited-label'; el.querySelector('.bubble').appendChild(ed); }
    ed.textContent = '(edited)';
  }
}
function deleteMessage(msgId) {
  if (!confirm('Delete this message?')) return;
  const payload = { message_id: msgId };
  if (currentDmKey) payload.dm_key = currentDmKey; else payload.room = currentRoom;
  socket.emit('delete_message', payload);
  deleteMsgEl(msgId, currentRoom);
}
function deleteMsgEl(msgId, room) {
  const msgs = room ? (allMessages[room] || []) : getActiveMessages();
  const msg  = msgs.find(m => m.id === msgId);
  if (msg) { msg.deleted = true; }
  const el = document.getElementById('msg-' + msgId);
  if (el) {
    const bt = el.querySelector('.bubble-text');
    if (bt) bt.innerHTML = '<em>This message was deleted</em>';
    el.querySelector('.bubble')?.classList.add('deleted');
    const acts = el.querySelector('.msg-actions');
    if (acts) { acts.querySelector('button[title="Edit"]')?.remove(); acts.querySelector('button[title="Delete"]')?.remove(); }
  }
}

/* ═══════════════════════════════════════════
   REPLY
═══════════════════════════════════════════ */
function setReply(id, name, text) {
  replyTo = { id, name, text };
  document.getElementById('replyBar').classList.add('visible');
  document.getElementById('replyBarName').textContent = name;
  document.getElementById('replyBarText').textContent = text || '🖼️ Image';
  document.getElementById('msgInput').focus();
}
function clearReply() { replyTo = null; document.getElementById('replyBar').classList.remove('visible'); }
function scrollToMsg(id) {
  const el = document.getElementById('msg-' + id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); el.style.outline = '2px solid var(--accent)'; setTimeout(() => el.style.outline = '', 1200); }
}

/* ═══════════════════════════════════════════
   IMAGE UPLOAD
═══════════════════════════════════════════ */
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith('image/')) { toast('Please select an image file'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = { dataUrl: ev.target.result, file };
    document.getElementById('imgPreviewThumb').src = ev.target.result;
    document.getElementById('imgPreviewName').textContent = file.name;
    document.getElementById('imgPreviewBar').classList.add('visible');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function clearImageAttachment() {
  pendingImage = null;
  document.getElementById('imgPreviewBar').classList.remove('visible');
  document.getElementById('imgPreviewThumb').src = '';
}
function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

/* ═══════════════════════════════════════════
   @MENTION AUTOCOMPLETE
═══════════════════════════════════════════ */
let mentionQuery = null, mentionStart = -1, mentionFocusIdx = 0;

function handleMentionInput(e) {
  const input = document.getElementById('msgInput');
  const val = input.value, pos = input.selectionStart;
  const before = val.slice(0, pos);
  const m = before.match(/@(\w*)$/);
  if (m) {
    mentionQuery = m[1].toLowerCase(); mentionStart = before.lastIndexOf('@');
    const matches = Object.keys(allUsers).filter(n => n.toLowerCase().startsWith(mentionQuery) && n !== myName);
    if (matches.length) { showMentionDropdown(matches); return; }
  }
  hideMentionDropdown();
}
function showMentionDropdown(names) {
  const dd = document.getElementById('mentionDropdown');
  dd.innerHTML = ''; mentionFocusIdx = 0;
  names.forEach((name, i) => {
    const u = allUsers[name];
    const d = document.createElement('div');
    d.className = 'mention-opt' + (i === 0 ? ' focused' : '');
    d.innerHTML = `<div class="mo-av" style="background:${u.avatarBg}">${u.avatar}</div><div class="mo-name">@${escHtml(name)}</div>`;
    d.onclick = () => insertMention(name);
    dd.appendChild(d);
  });
  dd.classList.add('visible');
}
function hideMentionDropdown() { document.getElementById('mentionDropdown').classList.remove('visible'); mentionQuery = null; mentionStart = -1; }
function insertMention(name) {
  const input = document.getElementById('msgInput');
  const val   = input.value;
  const after = val.slice(mentionStart + 1 + (mentionQuery?.length || 0));
  input.value = val.slice(0, mentionStart) + '@' + name + ' ' + after;
  hideMentionDropdown(); input.focus();
}

/* ═══════════════════════════════════════════
   REACTIONS
═══════════════════════════════════════════ */
function sendReaction(btn, emoji, messageId) {
  if (!socket || !myName) return;
  socket.emit('reaction', { room: currentDmKey ? 'dm' : currentRoom, message_id: messageId, emoji, dm_key: currentDmKey });
  const el = document.getElementById('msg-' + messageId);
  if (el) applyReactionBadge(el, emoji, myName);
}
function applyReactionBadge(rowEl, emoji, fromName) {
  const msgs = getActiveMessages();
  const msg  = msgs.find(m => m.id === rowEl.id.replace('msg-',''));
  if (msg) {
    if (!msg.reactions) msg.reactions = {};
    if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
    if (!msg.reactions[emoji].includes(fromName)) msg.reactions[emoji].push(fromName);
  }
  let rr = rowEl.querySelector('.reaction-row');
  if (!rr) { rr = document.createElement('div'); rr.className = 'reaction-row'; rowEl.querySelector('.msg-group').insertBefore(rr, rowEl.querySelector('.msg-time')); }
  let badge = rr.querySelector(`.react-badge[data-emoji="${emoji}"]`);
  if (!badge) {
    badge = document.createElement('span'); badge.className = 'react-badge'; badge.dataset.emoji = emoji; badge.dataset.count = '0';
    badge.onclick = () => sendReaction(null, emoji, rowEl.id.replace('msg-',''));
    rr.appendChild(badge);
  }
  const c = parseInt(badge.dataset.count) + 1;
  badge.dataset.count = c;
  badge.innerHTML = `${emoji} <span style="font-size:11px;color:var(--muted)">${c}</span>`;
  if (fromName === myName) badge.classList.add('mine');
}

/* ═══════════════════════════════════════════
   TYPING
═══════════════════════════════════════════ */
function showTypingUser(name, avatar) {
  if (typingUsers[name]) clearTimeout(typingUsers[name]);
  typingUsers[name] = setTimeout(() => clearTypingUser(name), 3000);
  renderTypingIndicator();
}
function clearTypingUser(name) { delete typingUsers[name]; renderTypingIndicator(); }
function clearAllTyping() { Object.values(typingUsers).forEach(clearTimeout); typingUsers = {}; renderTypingIndicator(); }
function renderTypingIndicator() {
  const names = Object.keys(typingUsers);
  const old = document.getElementById('typingIndicator');
  if (old) old.remove();
  if (!names.length) return;
  const el = document.createElement('div'); el.className = 'typing-row'; el.id = 'typingIndicator';
  const label = names.length === 1 ? `${names[0]} is typing…` : names.length === 2 ? `${names[0]} & ${names[1]} are typing…` : 'Several people are typing…';
  el.innerHTML = `<div class="typing-avatar">${AVATARS[0]}</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:8px;font-size:12px;color:var(--muted)">${escHtml(label)}</span></div>`;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}
function handleTyping() {
  if (!socket || !myName || currentDmKey) return;
  clearTimeout(typingTimer);
  socket.emit('typing', { room: currentRoom });
  typingTimer = setTimeout(() => {}, 2000);
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function handleKey(e) {
  const dd = document.getElementById('mentionDropdown');
  if (dd.classList.contains('visible')) {
    const opts = dd.querySelectorAll('.mention-opt');
    if (e.key === 'ArrowDown') { e.preventDefault(); mentionFocusIdx = Math.min(mentionFocusIdx+1, opts.length-1); opts.forEach((o,i) => o.classList.toggle('focused', i===mentionFocusIdx)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); mentionFocusIdx = Math.max(mentionFocusIdx-1, 0); opts.forEach((o,i) => o.classList.toggle('focused', i===mentionFocusIdx)); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); dd.querySelector('.mention-opt.focused')?.click(); return; }
    if (e.key === 'Escape') { hideMentionDropdown(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function appendToInput(em) { const inp = document.getElementById('msgInput'); inp.value += em; inp.focus(); autoResize(inp); }
function scrollToBottom() { const m = document.getElementById('messages'); setTimeout(() => { m.scrollTop = m.scrollHeight; }, 30); }
function fmtTime(ts) { return new Date(Number(ts)).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function showMembers() {
  const members = roomMembers[currentRoom] || [];
  const names = members.map(u => (u.avatar||'') + ' ' + u.name).join(', ');
  toast(members.length ? `Online: ${names}` : 'No other members yet');
}
function toast(msg, cls = '') {
  const t = document.getElementById('toasts');
  const el = document.createElement('div'); el.className = 'toast' + (cls ? ' '+cls : ''); el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3500);
}
function startPing() {
  setInterval(() => { if (!socket || !socket.connected) return; socket.emit('ping_latency', { ts: Date.now() }); }, 5000);
}

document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) closeEditModal(); });
document.getElementById('dmModal').addEventListener('click', e => { if (e.target === document.getElementById('dmModal')) closeDmModal(); });

// Boot
init();
</script>
